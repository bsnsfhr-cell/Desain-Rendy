<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Visitor Location</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

#map{
height:450px;
border-radius:10px;
}

.info{
margin-top:10px;
line-height:1.8;
}

</style>

</head>

<body>

<div class="container">

<h1>🌍 Live Visitor Location</h1>

<div class="card">

<h3>📊 Informasi Pengunjung</h3>

<div class="info" id="info"></div>

</div>

<div class="card">

<h3>🗺 Lokasi Pengunjung</h3>

<div id="map"></div>

</div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

async function getVisitor(){

let res = await fetch("https://ipapi.co/json/")
let data = await res.json()

let ip = data.ip
let country = data.country_name
let city = data.city
let lat = data.latitude
let lon = data.longitude
let isp = data.org
let device = navigator.userAgent

document.getElementById("info").innerHTML = `
IP Address : ${ip} <br>
Negara : ${country} <br>
Kota : ${city} <br>
ISP : ${isp} <br>
Device : ${device}
`

let map = L.map('map').setView([lat,lon],10)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:18
}).addTo(map)

L.marker([lat,lon])
.addTo(map)
.bindPopup("Lokasi pengunjung: "+city+", "+country)
.openPopup()

}

getVisitor()

</script>

</body>
</html>
